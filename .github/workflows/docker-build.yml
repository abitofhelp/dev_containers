name: Docker Build

on:
  pull_request:
    branches: [ main ]
    paths:
      - "ada/**"
      - "cpp/**"
      - "go/**"
      - "rust/**"
      - "entrypoint.sh"
      - ".github/workflows/docker-build.yml"
  push:
    branches: [ main ]
    paths:
      - "ada/**"
      - "cpp/**"
      - "go/**"
      - "rust/**"
      - "entrypoint.sh"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Ada (Alire-managed toolchain, amd64 only) --------------------
          - name: "ada"
            image_name: "dev-container-ada"
            dockerfile: "ada/Dockerfile"
            lang_dir: "ada"
            platforms: "linux/amd64"
            build_args: "--build-arg GNAT_VERSION=15.2.1 --build-arg GPRBUILD_VERSION=25.0.1"
            workdir: "examples/hello_ada"
            smoke_test: |
              set -e
              echo "=== Environment ==="
              echo "USER=$(whoami) UID=$(id -u) GID=$(id -g) HOME=$HOME"
              echo "DISPLAY_USER=$DISPLAY_USER"
              echo "CONTAINER_RUNTIME=$CONTAINER_RUNTIME"
              echo ""
              echo "=== Compile test ==="
              alr exec -- gprbuild -P hello_ada.gpr -j0
              echo ""
              echo "=== Run test ==="
              bin/hello_ada
              echo ""
              echo "=== Toolchain versions ==="
              alr exec -- gnat --version | head -1
              alr exec -- gprbuild --version | head -1
              alr --version | head -1
              echo "=== Smoke test passed ==="

          # ---- Ada (system toolchain, amd64 + arm64) ------------------------
          - name: "ada-system"
            image_name: "dev-container-ada-system"
            dockerfile: "ada/Dockerfile.system"
            lang_dir: "ada"
            platforms: "linux/amd64,linux/arm64"
            build_args: ""
            workdir: "examples/hello_ada"
            smoke_test: |
              set -e
              echo "=== Environment ==="
              echo "USER=$(whoami) UID=$(id -u) GID=$(id -g) HOME=$HOME"
              echo "DISPLAY_USER=$DISPLAY_USER"
              echo "CONTAINER_RUNTIME=$CONTAINER_RUNTIME"
              echo ""
              echo "=== Compile test ==="
              gprbuild -P hello_ada.gpr -j0
              echo ""
              echo "=== Run test ==="
              bin/hello_ada
              echo ""
              echo "=== Toolchain versions ==="
              gnat --version | head -1
              gprbuild --version | head -1
              alr --version | head -1
              echo "=== Smoke test passed ==="

          # ---- C++ (upstream toolchain, amd64 + arm64) ----------------------
          - name: "cpp"
            image_name: "dev-container-cpp"
            dockerfile: "cpp/Dockerfile"
            lang_dir: "cpp"
            platforms: "linux/amd64,linux/arm64"
            build_args: ""
            workdir: "examples/hello_cpp"
            smoke_test: |
              set -e
              echo "=== Environment ==="
              echo "USER=$(whoami) UID=$(id -u) GID=$(id -g) HOME=$HOME"
              echo "DISPLAY_USER=$DISPLAY_USER"
              echo "CONTAINER_RUNTIME=$CONTAINER_RUNTIME"
              echo ""
              echo "=== Compile test (CMake + Ninja) ==="
              cmake -B build -G Ninja -DCMAKE_CXX_STANDARD=20
              cmake --build build
              echo ""
              echo "=== Run test ==="
              ./build/hello_cpp
              echo ""
              echo "=== Toolchain versions ==="
              gcc --version | head -1
              g++ --version | head -1
              clang --version | head -1
              cmake --version | head -1
              ninja --version
              arm-none-eabi-gcc --version | head -1
              echo "=== Smoke test passed ==="

          # ---- C++ (system toolchain, amd64 + arm64) ------------------------
          - name: "cpp-system"
            image_name: "dev-container-cpp-system"
            dockerfile: "cpp/Dockerfile.system"
            lang_dir: "cpp"
            platforms: "linux/amd64,linux/arm64"
            build_args: ""
            workdir: "examples/hello_cpp"
            smoke_test: |
              set -e
              echo "=== Environment ==="
              echo "USER=$(whoami) UID=$(id -u) GID=$(id -g) HOME=$HOME"
              echo "DISPLAY_USER=$DISPLAY_USER"
              echo "CONTAINER_RUNTIME=$CONTAINER_RUNTIME"
              echo ""
              echo "=== Compile test (CMake + Ninja) ==="
              cmake -B build -G Ninja -DCMAKE_CXX_STANDARD=20
              cmake --build build
              echo ""
              echo "=== Run test ==="
              ./build/hello_cpp
              echo ""
              echo "=== Toolchain versions ==="
              gcc --version | head -1
              g++ --version | head -1
              clang --version | head -1
              cmake --version | head -1
              ninja --version
              arm-none-eabi-gcc --version | head -1
              echo "=== Smoke test passed ==="

          # ---- Go (amd64 + arm64) -------------------------------------------
          - name: "go"
            image_name: "dev-container-go"
            dockerfile: "go/Dockerfile"
            lang_dir: "go"
            platforms: "linux/amd64,linux/arm64"
            build_args: ""
            workdir: "examples/hello_go"
            smoke_test: |
              set -e
              echo "=== Environment ==="
              echo "USER=$(whoami) UID=$(id -u) GID=$(id -g) HOME=$HOME"
              echo "DISPLAY_USER=$DISPLAY_USER"
              echo "CONTAINER_RUNTIME=$CONTAINER_RUNTIME"
              echo ""
              echo "=== Compile test (go build) ==="
              go build -o hello_go .
              echo ""
              echo "=== Run test ==="
              ./hello_go
              echo ""
              echo "=== Cross-compilation test ==="
              GOOS=darwin GOARCH=amd64 go build -o /dev/null .
              GOOS=darwin GOARCH=arm64 go build -o /dev/null .
              GOOS=linux GOARCH=arm64 go build -o /dev/null .
              GOOS=windows GOARCH=amd64 go build -o /dev/null .
              echo "Cross-compilation: PASSED"
              echo ""
              echo "=== Toolchain versions ==="
              go version
              gopls version 2>&1 | head -1
              dlv version 2>&1 | head -1
              staticcheck --version
              golangci-lint --version 2>&1 | head -1
              protoc --version
              buf --version
              echo "=== Smoke test passed ==="

          # ---- Rust (amd64 + arm64) -----------------------------------------
          - name: "rust"
            image_name: "dev-container-rust"
            dockerfile: "rust/Dockerfile"
            lang_dir: "rust"
            platforms: "linux/amd64,linux/arm64"
            build_args: ""
            workdir: "examples/hello_rust"
            smoke_test: |
              set -e
              echo "=== Environment ==="
              echo "USER=$(whoami) UID=$(id -u) GID=$(id -g) HOME=$HOME"
              echo "DISPLAY_USER=$DISPLAY_USER"
              echo "CONTAINER_RUNTIME=$CONTAINER_RUNTIME"
              echo ""
              echo "=== Compile test (cargo build) ==="
              cargo build 2>&1
              echo ""
              echo "=== Run test ==="
              cargo run 2>&1
              echo ""
              echo "=== Toolchain versions ==="
              rustc --version
              cargo --version
              rustup target list --installed | head -6
              probe-rs --version
              mold --version
              arm-linux-gnueabihf-gcc --version | head -1
              echo "=== Smoke test passed ==="

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (${{ matrix.name }}, ${{ matrix.platforms }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platforms }} \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.build_args }} \
            -t ${{ matrix.image_name }}:ci .

      - name: Load amd64 image for smoke test
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.build_args }} \
            -t ${{ matrix.image_name }}:ci .

      - name: Smoke test (${{ matrix.name }})
        run: |
          docker run --rm \
            -e HOST_UID=$(id -u) \
            -e HOST_GID=$(id -g) \
            -e HOST_USER=$(whoami) \
            -v "${{ github.workspace }}/${{ matrix.lang_dir }}":/workspace \
            -w /workspace/${{ matrix.workdir }} \
            ${{ matrix.image_name }}:ci \
            bash -c '${{ matrix.smoke_test }}'
