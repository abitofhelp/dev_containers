# ============================================================================
#
# Purpose:
#   Publish a GitHub Release when a `v*` tag is pushed. Release notes are
#   extracted from the matching `## [<version>]` section of CHANGELOG.md,
#   so there is no manual editing of the Release body in the GitHub UI.
#
# Usage:
#   # 1. Move CHANGELOG.md entries: [Unreleased] -> [X.Y.Z] with today's date.
#   # 2. Commit the CHANGELOG update on main.
#   git commit -am "docs: prepare X.Y.Z release notes"
#   git push origin main
#
#   # 3. Tag and push. This workflow fires on the tag push.
#   git tag vX.Y.Z
#   git push origin vX.Y.Z
#
# Companion workflows:
#   - docker-publish.yml: also triggers on `v*` tag push. Builds and
#     pushes the six container images tagged with the release version
#     (`:vX.Y.Z` and, for stable releases, `:latest`).
#   - docker-build.yml: CI build validation on main pushes and PRs.
#
# Pre-release tags:
#   Tags containing a hyphen (e.g. `v1.0.0-rc1`, `v1.0.0-beta.2`) are
#   marked as GitHub pre-releases automatically.
#
# Design notes:
#   - Uses the GitHub CLI (pre-installed on ubuntu-latest runners) rather
#     than a third-party release action, so there are no external
#     supply-chain dependencies beyond actions/checkout.
#   - The CHANGELOG extractor is a short awk script to avoid adding a
#     language runtime dependency. It captures every line from the
#     matching `## [X.Y.Z]` heading up to (but not including) the next
#     `## [` heading.
# ============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Derive version from tag
        id: version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "tag=$tag"               >> "$GITHUB_OUTPUT"
          echo "version=$version"       >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Tag:        $tag"
          echo "Version:    $version"
          echo "Prerelease: $prerelease"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          notes_path=/tmp/release-notes.md
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > "$notes_path"
          if [ ! -s "$notes_path" ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION" >&2
            echo "::error::Expected a heading of the form '## [$VERSION]' in CHANGELOG.md" >&2
            exit 1
          fi
          echo "notes_path=$notes_path" >> "$GITHUB_OUTPUT"
          echo "=== Extracted release notes ==="
          cat "$notes_path"
          echo "==============================="

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_PATH" \
            --verify-tag \
            $prerelease_flag
